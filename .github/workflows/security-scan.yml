name: Security Vulnerability Scan

on:
  # Run on every push to main branch
  push:
    branches: [ main, master ]
  # Run on pull requests
  pull_request:
    branches: [ main, master ]
  # Run weekly on Mondays at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pip-audit safety
        
    - name: Run pip-audit
      run: |
        echo "Running pip-audit security scan..."
        pip-audit --desc --format json --output pip-audit-report.json || true
        pip-audit --desc
      continue-on-error: true
      
    - name: Run safety check
      run: |
        echo "Running safety security scan..."
        safety check --json --output safety-report.json || true
        safety check --full-report
      continue-on-error: true
      
    - name: Upload pip-audit report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: pip-audit-report
        path: pip-audit-report.json
        retention-days: 30
        
    - name: Upload safety report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: safety-report
        path: safety-report.json
        retention-days: 30
        
    - name: Check for critical vulnerabilities
      run: |
        echo "Checking for critical vulnerabilities..."
        # Fail the build if critical vulnerabilities are found
        pip-audit --require-hashes --dry-run || echo "::warning::Critical vulnerabilities found. Please review security reports."
        
    - name: Generate Security Summary
      if: always()
      run: |
        echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### pip-audit Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        pip-audit --desc || echo "Vulnerabilities found - see detailed report" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### safety Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        safety check --short-report || echo "Vulnerabilities found - see detailed report" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
